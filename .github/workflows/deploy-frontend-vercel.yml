name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "vercel.json"
      - ".github/workflows/deploy-frontend-vercel.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel secrets
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          test -n "$VERCEL_TOKEN" || (echo "Missing GitHub secret: VERCEL_TOKEN" && exit 1)
          test -n "$VERCEL_ORG_ID" || (echo "Missing GitHub secret: VERCEL_ORG_ID" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "Missing GitHub secret: VERCEL_PROJECT_ID" && exit 1)
          test -n "$AWS_ROLE_TO_ASSUME" || (echo "Missing GitHub secret: AWS_ROLE_TO_ASSUME" && exit 1)

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-2' }}

      - name: Resolve backend API URL
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ vars.BACKEND_STACK_NAME || 'aws-browser-api' }}" \
            --region "${{ vars.AWS_REGION || 'ap-southeast-2' }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue | [0]" \
            --output text)
          test -n "$API_URL" || (echo "Backend API URL not found in CloudFormation outputs" && exit 1)
          test "$API_URL" != "None" || (echo "Backend API URL is empty (stack output missing)" && exit 1)
          echo "AWS_BROWSER_API_BASE_URL=$API_URL" >> "$GITHUB_ENV"

      - name: Deploy with Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          AWS_BROWSER_API_TOKEN: ${{ secrets.AWS_BROWSER_API_TOKEN }}
        run: |
          npm install --global vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
